version: 1
policy:
  source_of_truth: docs/todo.yaml
  legacy_markdown: docs/todo.md
  rules:
  - Use dephy_todo as the global TODO entry point.
  - Before starting work, add or update the relevant TODO item.
  - When behavior changes, update TODO status in the same change.
  - Keep legacy markdown details until they are fully migrated into this YAML.
items:
- id: benchmark-random-drop-recovery-balance
  area: performance
  title: Rework random-drop recovery benchmark into equal-client recovery sanity comparison.
  status: done
  notes: Added on 2026-06-26 after the first random-drop run showed a misleading
    fallback result: admission was 32, so all failed clients landed on broker D
    and connected-delivery stayed at 100%. Redesign the benchmark to use four
    brokers with random broker drops, compare mosquitto, field no-fallback, and
    field fallback, use a lower admission limit such as 8, distribute publishers
    and subscribers across A/B/C/D, record connected and requested delivery rates,
    and update README/results tables with the corrected comparison. Final
    recovery sanity run 20260626-213227 uses equal connected clients after
    dropping brokers A/B and local per-broker topics; mosquitto, field
    no-fallback, and field fallback all delivered 100.0% with about 3,581 msg/s.
    Fallback capacity gains remain covered by the client-limit and topic-limit
    burst tests, where requested load exceeds one broker's remaining capacity.
- id: hardware-six-eth-config
  area: hardware
  title: Flash and provision six W5500 ESP32 boards for manual bridge/MQTT validation.
  status: in_progress
  notes: Started on 2026-06-26. Build exists at build_product_eth. Target mapping
    is /dev/ttyUSB0-5 with management IPs 192.168.127.4-9 and broker IPs
    192.168.127.15-20, MQTT port 1883, bridge port 4884. Run the preparation
    through tmux session six-eth-config so SSH disconnects do not stop flashing.
    Current user-requested sequence is 2 ETH boards first, 4 WiFi boards next,
    then all 6 bridges running for manual MQTT validation. The active product
    firmware line is Ethernet-only; WiFi validation must use the separate WiFi
    test profile/build, not the product ETH build.
- id: hardware-dual-w5500-cli-bridge-recheck
  area: hardware
  title: Re-test two W5500 Ethernet ESP32 MQTT bridge peers with the current CLI-only firmware.
  status: done
  notes: User requested a fresh check on 2026-06-26. Use tmux for the run. The old
    HTTP-based dual W5500 script is no longer the right control path because the
    current product removed provisioning HTTP; configure peers through UART CLI
    and then verify MQTT publish/subscribe through broker IPs. First attempts
    failed before MQTT verification: Zephyr console_getline crashed in the UART
    console thread, then the UART polling replacement built but did not complete
    ESP A provisioning. On 2026-06-26, changed startup so erased boards wait in
    UART provisioning before broker startup, changed the CLI thread back to
    Zephyr console_getline with a larger stack, and changed the script to flash,
    erase, and provision one board at a time using stable by-path serial ports.
    Run r5 provisioned ESP A and ESP B, both broker TCP ports opened, and manual
    MQTT bridge verification passed in both directions. Script timeout was raised
    because one hardware bridge direction delivered after the original 15s window.
    Run r6 then passed end-to-end with EXIT_CODE=0 in tmux
    eth-2node-cli-recheck-r6-20260626. Final ETH mapping for manual testing is
    ESP A management 192.168.127.4 / broker 192.168.127.15 and ESP B management
    192.168.127.6 / broker 192.168.127.16.
- id: hardware-six-bridge-manual-validation
  area: hardware
  title: Stage manual validation for 2 ETH, 4 WiFi, then 6 total bridge/MQTT nodes.
  status: done
  notes: Added on 2026-06-26 for the requested staged manual-test setup. Stage
    1 runs the current CLI-only Ethernet product firmware on two W5500 boards
    through tmux and provisions MQTT/bridge config over UART. Stage 2 needs the
    WiFi test-profile firmware on four WiFi boards because main product firmware
    is Ethernet-only. Stage 1 manual verification passed on 2026-06-26 with ESP
    A broker 192.168.127.15 and ESP B broker 192.168.127.16. Stage 3 records
    the final six-node operating config for manual bridge/MQTT testing. Stage
    2 passed in tmux wifi-4node-bridge-r1-20260626 with WiFi nodes 10.88.0.2
    through 10.88.0.5, 4-node MQTT bridge delivery, and fallback distribution
    2/2/2/1 across all four brokers. Final six-node TCP check passed at
    tests/linux/out/hardware/six-node-current-check-20260626-191308.log with
    MQTT 1883 open on ETH brokers 192.168.127.15/16 and WiFi brokers
    10.88.0.2-5.
- id: todo-yaml-source
  area: repo
  title: Add docs/todo.yaml so the product app is tracked globally.
  status: done
- id: migrate-legacy-todo
  area: repo
  title: Migrate the remaining historical docs/todo.md checklist into structured YAML
    without losing details.
  status: done
  notes: Current actionable product TODOs are structured in YAML while legacy markdown
    remains as history.
- id: integrate-industrial-io
  area: integration
  title: Add dephy_industrial_io as a pinned dependency and wire product IO bridge
    calls through its public API.
  status: done
  notes: Added dephy_industrial_io dependency and product_io_bridge wrapper with Linux
    unit coverage.
- id: adopt-dephy-testkit
  area: validation
  title: Adopt dephy_testkit fixtures for product Linux integration tests and IO/MQTT
    bridge scenarios.
  status: done
  notes: Added dephy_testkit dependency and test_with_testkit.sh wrapper.
- id: hardware-wifi-reconnect
  area: hardware
  title: Validate peer reconnection after WiFi reconnect on target ESP32 hardware.
  status: done
  notes: Obsolete after the 2026-06-24 Ethernet-only product direction change; WiFi
    reconnect is no longer part of this product.
- id: hardware-live-wifi-scan
  area: hardware
  title: Replace the ESP32 WiFi scan placeholder with live scan results after board-specific
    WiFi management is selected.
  status: done
  notes: Obsolete after the 2026-06-24 Ethernet-only product direction change; WiFi
    scan UI/API were removed.
- id: hardware-esp32-ap-association
  area: hardware
  title: Debug intermittent ESP32 SoftAP association failures from the Linux USB WiFi
    test adapter.
  status: done
  notes: On 2026-06-24 wlxd84489239707 intermittently scanned ESP32-Min-Broker
    at BSSID E0:5A:1B:5A:B4:1D but NetworkManager/wpa_supplicant timed out during
    authentication and reported ssid-not-found. The failure reproduced even after
    deactivating the Linux-Bridge-Test AP, so continue from ESP32 SoftAP logs,
    radio/driver compatibility, or reset/flash validation. Later on 2026-06-24,
    reset via /dev/ttyUSB0 restored SoftAP advertising and the single-adapter
    homepage/API validation passed on wlx3c64cf742c7b. Keep dual-adapter testing
    as stress/debug only. Later WPA PSK attempts reached association/4-way handshake
    then failed with beacon-loss/WRONG_KEY symptoms on Linux USB adapters. Keep the
    development AP open (`ap_password=open`) so broker/web work is not blocked while
    WPA compatibility is debugged separately. Later on 2026-06-24, product firmware
    and a temporary minimal Zephyr AP-only app both advertised the ESP32 AP at BSSID
    E0:5A:1B:5A:B4:1D, but NetworkManager still timed out during association even
    when BSSID was pinned. The minimal app had DRAM0 near 51% and heap near 94 KiB,
    so this is not caused by the product web/broker footprint alone. Continue by
    validating with another client/phone, another ESP32 board or antenna, and the
    Zephyr ESP32 SoftAP driver/radio path. Later on 2026-06-24 this was closed
    as obsolete because the product direction moved to Ethernet-only and removed
    SoftAP support.
- id: hardware-ip-values
  area: hardware
  title: Verify DHCP-derived local STA IP, AP/gateway IP, and peer broker IP values
    on hardware.
  status: done
  notes: Obsolete after the 2026-06-24 Ethernet-only product direction change; STA
    and AP IP values were removed from the product surface. Ethernet static fallback
    192.168.127.4 was validated by flash and chain bridge hardware tests.
- id: product-ethernet-only-direction
  area: architecture
  title: Shift the product direction to Ethernet-only networking.
  status: done
  notes: Product startup now uses product_ethernet, WiFi/SoftAP startup is removed
    from the build, runtime status reports network_state, and the active product
    surface is Ethernet DHCP/static IPv4.
- id: product-user-specified-broker
  area: firmware
  title: Make bridge broker targets user-specified instead of WiFi-discovered.
  status: done
  notes: Web and HTTP tests now cover explicit broker peer slots with name, host/IP,
    MQTT port, P2P port, and enabled state. Bridge control applies configured peers
    directly over Ethernet.
- id: product-remove-wifi-ap-code
  area: firmware
  title: Remove WiFi/AP firmware code paths from the product app.
  status: done
  notes: Removed product_wifi source/header, WiFi/AP Kconfig defaults, WiFi config
    fields, Bridge WiFi persistence/API state, WiFi HTTP endpoints, and console
    WiFi/AP commands. Active runtime status uses network_state.
- id: product-web-ethernet-broker-ui
  area: frontend
  title: Redesign the provisioning web UI for Ethernet and manual broker config.
  status: done
  notes: Network page presents Ethernet DHCP/static fields. Broker/Peers page now
    provides manual broker slot CRUD. AP SSID/password, scan buttons, Bridge WiFi
    enabled toggles, and WiFi status labels were removed.
- id: product-remove-login-auth
  area: frontend
  title: Remove provisioning login/auth from the Ethernet-only product UI and API.
  status: done
  notes: The page loads directly without login. Removed login form, session token
    handling, auth headers, admin password config field/API exposure, and HTTP
    auth gates for config, peers, broker control, publish test, and reset.
- id: product-ethernet-tests-docs
  area: validation
  title: Update tests and docs for the Ethernet-only product direction.
  status: done
  notes: Updated unit/browser tests for Ethernet network config, no-auth APIs,
    manual broker peer flows, removed routes, README, and Linux test docs.
- id: hardware-esp32-linux-chain-bridge
  area: validation
  title: Add and pass an ESP32-to-Linux broker1-5 chain bridge hardware test.
  status: done
  notes: Start Linux broker1 through broker5 with chain bridge links 1-2, 2-3,
    3-4, and 4-5. Configure the ESP32 broker to bridge Linux broker5, then
    verify Linux broker1 receives a publish sent to the ESP32 broker and the
    ESP32 broker receives a publish sent to Linux broker1. Passed on 2026-06-24
    with mqtt_min_broker mqtt-v0.1.18 after Linux 3-node chain validation,
    ESP32 flash verification, and the 5-node hardware chain test.
- id: provisioning-render-cost
  area: performance
  title: Profile provisioning HTML/status rendering and cap response sizes for embedded
    memory headroom.
  status: done
  notes: Added provisioning generated-header size regression with 64 KiB default limit.
- id: deps-sync-cache
  area: performance
  title: Skip dependency re-sync work when deps.json pins already match clean local
    deps.
  status: done
  notes: sync_deps skips clean dependency checkouts already at the requested tag or
    commit.
- id: product-static-cleanup-pass
  area: validation
  title: Clean up low-risk cppcheck findings in product runtime and provisioning handlers.
  status: done
  notes: Reduced local variable scope in provisioning route handlers and only allocates
    the peer snapshot array when the P2P runtime path is compiled.
- id: linux-web-one-command-start
  area: docs
  title: Make the product README quick start clone-to-shell-to-web instead of a multi-step
    build flow.
  status: done
  notes: Added run_linux_web.sh as the root Linux web entry point, updated README
    so the first path is git clone, cd, run one shell script, then open the printed
    local URL. The script auto-selects local sibling deps or pinned downloads.
- id: hardware-dual-w5500-bridge-validation
  area: hardware
  title: Validate two W5500-equipped ESP32 boards as Ethernet MQTT broker bridge peers.
  status: done
  notes: Passed on 2026-06-25 with /dev/ttyUSB0 at management 192.168.127.4 and
    broker 192.168.127.15, and /dev/ttyUSB1 at management 192.168.127.6 and broker
    192.168.127.16. The test uses one static seed from ESP A to ESP B because one
    P2P TCP connection is full duplex; bidirectional MQTT publish/subscribe passed.
    mqtt_min_broker mqtt-v0.1.20 fixes Zephyr P2P node IDs by deriving them from
    hardware ID.
- id: hardware-esp32-linux-esp32-bridge
  area: hardware
  title: Validate two W5500 ESP32 brokers bridged through one Linux broker.
  status: done
  notes: Use ESP A management 192.168.127.4 / broker 192.168.127.15, Linux host
    192.168.127.5 as the middle broker, and ESP B management 192.168.127.6 /
    broker 192.168.127.16. Verify bidirectional MQTT delivery across the two-hop
    bridge path ESP A <-> Linux <-> ESP B. Passed on 2026-06-25 with BRIDGE_MODE=star,
    where both ESP32 boards seed only the Linux middle broker; bidirectional MQTT
    publish/subscribe passed 10/10. BRIDGE_MODE=chain, where Linux actively seeds
    ESP B, reproduced an ESP reachability failure and remains a P2P stability
    investigation mode rather than the default validation path.
- id: product-mode-a-admission-load-balance
  area: architecture
  title: Implement Mode A broker admission fallback for bridge load balancing.
  status: done
  notes: Add broker-side local client admission limit so an overloaded bridge node
    rejects new MQTT CONNECT with CONNACK server-unavailable instead of handling
    the session locally. Validate fallback with W5500 ESP32 and Linux brokers so
    publish/subscribe still works through bridge routing while new clients move
    to the less-loaded broker. Implemented through mqtt_min_broker mqtt-v0.1.21
    and enabled in the product with CONFIG_MQTT_ADMISSION_MAX_CLIENTS=2.
- id: hardware-mode-a-w5500-linux-validation
  area: hardware
  title: Validate Mode A admission fallback with W5500 ESP32 and Linux node.
  status: done
  notes: Use one W5500 ESP32 plus one Linux broker in a bridge topology. Fill the
    ESP32 local admission limit, verify the next client is rejected by ESP32 and
    connects to Linux, then verify MQTT delivery through the bridge in both
    directions. Passed on 2026-06-25 with /dev/ttyUSB0 ESP32 at management
    192.168.127.4 / broker 192.168.127.15 and Linux fallback broker at
    192.168.127.5:21884; test_esp32_linux_admission_fallback.sh reported
    10/10 passing.
- id: hardware-mode-a-dual-w5500-fallback
  area: hardware
  title: Validate Mode A admission fallback from one W5500 ESP32 broker to another.
  status: done
  notes: Flash both W5500-equipped ESP32 boards with mqtt-v0.1.21 admission firmware.
    Fill ESP B's local admission slots, verify the overflow client is rejected
    by ESP B and falls back to ESP A, then verify MQTT delivery from ESP A to
    ESP B's existing clients through the bridge. Passed on 2026-06-25 with
    ESP A /dev/ttyUSB0 at management 192.168.127.4 and broker 192.168.127.15,
    and ESP B /dev/ttyUSB1 at management 192.168.127.6 and broker 192.168.127.16;
    test_dual_esp32_admission_fallback.sh reported 14/14 passing.
- id: hardware-status-led-button-controls
  area: hardware
  title: Add status LEDs and single-button software power/config-reset controls
    for W5500 ESP32 boards.
  status: done
  notes: Use GPIO2 as the software-controlled blue status LED and GPIO0/IO0 as
    the software power/config key. EN stays a hardware-only reset pin. The board
    red LED is treated as a hardware power indicator and is not controlled by
    firmware. Blue blinks slowly every 2 seconds while the broker is running,
    blinks quickly while booting or on startup errors, and stays off when the
    broker is disabled. IO0 no longer toggles software power; plugging in power
    always starts the broker and clears any persisted broker_enabled=0 state.
    Holding IO0 for at least 10 seconds while the broker is running restores
    default config and reboots. Built and flashed on 2026-06-25 to /dev/ttyUSB0
    and /dev/ttyUSB1; both passed Ethernet, HTTP, and broker reboot verification,
    and the dual-W5500 admission fallback test still reported 14/14 passing.
- id: hardware-wifi-six-node-linux-ap-bridge
  area: hardware
  title: Validate six ESP32 brokers on a Linux AP with WiFi module enabled and bidirectional
    MQTT bridge routing.
  status: in_progress
  notes: Add or restore a WiFi-enabled product test profile using dephy_wifi without
    regressing the Ethernet product profile. Start a Linux AP, connect all six ESP32
    boards as STA clients, configure a bridge topology within the two-peer stability
    limit, and verify bidirectional MQTT delivery across the ESP32 broker bridge.
- id: hardware-bridge-test-automation
  area: validation
  title: Add repeatable scripts and dephy_testkit triggers for Ethernet dual-W5500 and
    Linux-AP WiFi six-node bridge tests.
  status: in_progress
  notes: Added Ethernet dual-W5500 bridge hardware coverage through
    tests/linux/test_dual_esp32_w5500_bridge.sh. Linux-AP WiFi six-node bridge
    automation remains open.
