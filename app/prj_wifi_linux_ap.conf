# WiFi/Linux-AP hardware test profile for ESP32 boards without W5500 modules.
CONFIG_FIELD_BRIDGE_WIFI_TEST_PROFILE=y

# Replace W5500 Ethernet with ESP32 WiFi STA-only.
CONFIG_ETH_W5500=n
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_WIFI_USAGE_MODE_STA=y
CONFIG_WIFI_STA_AUTO_DHCPV4=n
CONFIG_DEPHY_WIFI=y
CONFIG_DEPHY_ETH=n

# Stability-first WiFi STA profile. The bridge workload is small, so prefer
# bounded memory and shorter queues over throughput.
CONFIG_NET_DHCPV4=n
CONFIG_NET_DHCPV4_SERVER=n
CONFIG_NET_ARP_TABLE_SIZE=8
CONFIG_NET_ARP_GRATUITOUS=y
CONFIG_NET_MAX_CONN=8
CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_TCP_TIME_WAIT_DELAY=0
CONFIG_NET_TCP_RETRY_COUNT=4
CONFIG_NET_PKT_RX_COUNT=12
CONFIG_NET_PKT_TX_COUNT=12
CONFIG_NET_BUF_RX_COUNT=28
CONFIG_NET_BUF_TX_COUNT=28
CONFIG_NET_SOCKET_MAX_SEND_WAIT=2000
CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=n
CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=n
CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=6
CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=8
CONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=8
CONFIG_ESP32_WIFI_RX_MGMT_BUF_NUM_DEF=5
CONFIG_ESP32_WIFI_MGMT_SBUF_NUM=16

# The WiFi validation uses a small chain, but dynamic P2P can briefly overlap
# inbound/outbound snapshots while peers settle.
CONFIG_MQTT_P2P_PEER_MAX=3
CONFIG_MQTT_P2P_STATIC_SEEDS_ONLY=y
CONFIG_MQTT_P2P_REMOTE_SUBS_PER_NODE=8
CONFIG_MQTT_P2P_SHARD_OWNER_CACHE_SIZE=64

# WiFi + HTTP + MQTT needs a little more headroom than the Ethernet profile.
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1536
