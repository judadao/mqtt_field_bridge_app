# Networking
CONFIG_NETWORKING=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n

# WiFi
CONFIG_WIFI=y
CONFIG_WIFI_NM=y
CONFIG_WIFI_USAGE_MODE_STA_AP=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_SERVER=y
CONFIG_NET_IF_MAX_IPV4_COUNT=2
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=10
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096
CONFIG_NET_MAX_CONN=16
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_ZVFS_OPEN_MAX=16
CONFIG_ZVFS_OPEN_ADD_SIZE_NET=16
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=4096

# mqtt_min_broker dependency
CONFIG_MQTT_MIN_BROKER=y
CONFIG_MQTT_MAX_CLIENTS=4
CONFIG_MQTT_P2P_DYNAMIC=y
CONFIG_MQTT_P2P_STATIC_SEEDS_ONLY=y
CONFIG_MQTT_P2P_PEER_MAX=4
CONFIG_MQTT_P2P_REMOTE_SUBS_PER_NODE=4
CONFIG_MQTT_P2P_SHARD_OWNER_CACHE_SIZE=64

# Product app owns main() and provisioning.
CONFIG_MQTT_STANDALONE=n

# Memory
CONFIG_HEAP_MEM_POOL_SIZE=24576
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y

# NVS peer persistence
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# provisioning_http server (Zephyr k_thread path)
CONFIG_POSIX_API=y
