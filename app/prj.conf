# Networking
CONFIG_NETWORKING=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n

# Ethernet network path
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_ETHERNET_MGMT=y
CONFIG_ETH_W5500=y
CONFIG_SPI=y
CONFIG_GPIO=y

# Optional WiFi STA broker transport. Management web still runs on Ethernet.
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_WIFI_USAGE_MODE_STA=y
CONFIG_WIFI_STA_AUTO_DHCPV4=n
CONFIG_DEPHY_WIFI=y

CONFIG_NET_DHCPV4=y
CONFIG_NET_IF_MAX_IPV4_COUNT=2
CONFIG_NET_IF_UNICAST_IPV4_ADDR_COUNT=3
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_HWINFO=y
CONFIG_NET_MAX_CONN=10
CONFIG_NET_MAX_CONTEXTS=12
CONFIG_ZVFS_OPEN_ADD_SIZE_NET=16
CONFIG_NET_ARP_TABLE_SIZE=8
CONFIG_NET_ARP_GRATUITOUS=y
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=22
CONFIG_NET_BUF_TX_COUNT=22
CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=n
CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=n
CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=4
CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=6
CONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=6
CONFIG_ESP32_WIFI_RX_MGMT_BUF_NUM_DEF=5
CONFIG_ESP32_WIFI_MGMT_SBUF_NUM=8

# Ethernet provisioning web UI/API. WiFi builds compile this as a stub.
CONFIG_HTTP_SERVER=y
CONFIG_HTTP_SERVER_VERSION_1=y
CONFIG_HTTP_SERVER_VERSION_2=n
CONFIG_HTTP_SERVER_VERSION_3=n
CONFIG_HTTP_SERVER_NUM_SERVICES=1
CONFIG_HTTP_SERVER_MAX_CLIENTS=1
CONFIG_HTTP_SERVER_MAX_STREAMS=1
CONFIG_HTTP_SERVER_CLIENT_BUFFER_SIZE=768
CONFIG_HTTP_SERVER_MAX_URL_LENGTH=128
CONFIG_HTTP_SERVER_MAX_HEADER_LEN=64
CONFIG_HTTP_SERVER_STACK_SIZE=4096
CONFIG_ETH_W5500_RX_THREAD_PRIO=8
CONFIG_ETH_W5500_POLL_PERIOD=100
CONFIG_ETH_W5500_TIMEOUT=1000
CONFIG_NET_PROMISCUOUS_MODE=y

# mqtt_min_broker dependency
CONFIG_MQTT_MIN_BROKER=y
CONFIG_MQTT_MAX_CLIENTS=4
CONFIG_MQTT_ADMISSION_MAX_CLIENTS=2
CONFIG_MQTT_P2P_DYNAMIC=y
CONFIG_MQTT_P2P_STATIC_SEEDS_ONLY=y
CONFIG_MQTT_P2P_PEER_MAX=2
CONFIG_MQTT_P2P_REMOTE_SUBS_PER_NODE=4
CONFIG_MQTT_P2P_SHARD_OWNER_CACHE_SIZE=64

# Product app owns main() and UART CLI provisioning.
CONFIG_MQTT_STANDALONE=n
CONFIG_DEPHY_CONFIG=y
CONFIG_DEPHY_CLI=y

# Memory
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_LOG_BUFFER_SIZE=4096

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETLINE=y
CONFIG_CONSOLE_INPUT_MAX_LINE_LEN=160
CONFIG_REBOOT=y

# NVS peer persistence
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
